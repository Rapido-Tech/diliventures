name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Resolves to ghcr.io/<your-github-username>/<repo-name>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No NEXT_PUBLIC_ vars in this project — all secrets (MONGODB_URI,
          # AUTH_SECRET, GOOGLE_CLIENT_ID, etc.) are runtime-only and must be
          # set in Dokploy → your service → Environment Variables, NOT here.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # only runs after image is successfully pushed

    env:
      WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}

    steps:
      - name: Trigger Dokploy redeploy
        # Skips silently if DOKPLOY_WEBHOOK_URL has not been set yet.
        # To enable:
        #   GitHub → Repo → Settings → Secrets and variables → Actions → New secret
        #   Name:  DOKPLOY_WEBHOOK_URL
        #   Value: Dokploy → your app → Deployments tab → webhook URL
        #
        # Runtime env vars to set in Dokploy (not in this file):
        #   MONGODB_URI, AUTH_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
        #   NEXTAUTH_URL, AUTH_TRUST_HOST, PORT
        if: env.WEBHOOK_URL != ''
        run: curl --fail -X GET "$WEBHOOK_URL"
